<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Periodic Table Explorer</title>
<style>
  :root {
    --bg:#0f1320; --bg2:#161b2e; --panel:#1d2440; --panel2:#252d52;
    --text:#eef1fb; --muted:#9aa3c7; --accent:#ffd43b; --good:#51cf66;
    --lock:#2a3050; --radius:14px; --shadow:0 8px 24px rgba(0,0,0,.35);
    --c-alkali:#ff6b6b; --c-alkaline:#ff922b; --c-transition:#ffd43b;
    --c-post:#94d82d; --c-metalloid:#20c997; --c-nonmetal:#4dabf7;
    --c-halogen:#748ffc; --c-noble:#da77f2; --c-lanthanide:#f783ac; --c-actinide:#e599f7;
  }
  *{box-sizing:border-box;} html,body{margin:0;padding:0;}
  body{font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
    background:radial-gradient(1200px 700px at 70% -10%,#20284a 0%,var(--bg) 55%);
    color:var(--text);min-height:100vh;}

  header.topbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:16px 22px;
    background:linear-gradient(180deg,rgba(29,36,64,.95),rgba(15,19,32,.4));
    position:sticky;top:0;z-index:50;backdrop-filter:blur(6px);border-bottom:1px solid rgba(255,255,255,.06);}
  .brand{display:flex;flex-direction:column;margin-right:auto;}
  .brand h1{margin:0;font-size:1.3rem;letter-spacing:.3px;}
  .brand p{margin:2px 0 0;font-size:.8rem;color:var(--muted);}

  .btn{border:none;cursor:pointer;font:inherit;font-weight:600;color:var(--text);background:var(--panel2);
    padding:10px 16px;border-radius:999px;transition:transform .12s,background .15s,box-shadow .15s;box-shadow:var(--shadow);}
  .btn:hover{transform:translateY(-2px);background:#2e386a;}
  .btn:active{transform:translateY(0);}
  .btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}
  .btn.primary{background:linear-gradient(135deg,#5b6cff,#8b5bff);}
  .btn.ghost{background:transparent;box-shadow:none;border:1px solid rgba(255,255,255,.18);}
  .btn.danger{background:linear-gradient(135deg,#ff6b6b,#ff922b);}

  .streak{display:flex;align-items:center;gap:8px;background:var(--panel);padding:8px 14px;border-radius:999px;box-shadow:var(--shadow);font-weight:700;}
  .streak .flame{font-size:1.3rem;filter:drop-shadow(0 0 6px #ff922b88);}
  .streak small{color:var(--muted);font-weight:500;}

  main{padding:24px 22px 60px;}
  .legend{display:flex;flex-wrap:wrap;gap:10px 16px;margin:0 auto 22px;max-width:1100px;font-size:.78rem;color:var(--muted);}
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .legend i{width:13px;height:13px;border-radius:4px;display:inline-block;}

  .table-wrap{overflow-x:auto;padding-bottom:10px;}
  .ptable{display:grid;grid-template-columns:repeat(18,minmax(46px,1fr));grid-auto-rows:54px;gap:5px;max-width:1100px;margin:0 auto;min-width:900px;}
  .cell{border-radius:9px;position:relative;display:flex;flex-direction:column;justify-content:center;align-items:center;
    cursor:pointer;color:#10131f;font-weight:700;user-select:none;transition:transform .1s,box-shadow .1s,filter .1s;}
  .cell .num{position:absolute;top:3px;left:5px;font-size:.56rem;opacity:.75;}
  .cell .sym{font-size:1.05rem;line-height:1;}
  .cell:hover{transform:scale(1.12);z-index:5;box-shadow:0 6px 16px rgba(0,0,0,.5);}
  .cell.locked{background:var(--lock)!important;color:#5b648f;cursor:not-allowed;}
  .cell.locked .lockicon{position:absolute;bottom:3px;right:5px;font-size:.6rem;}
  .cell.learned::after{content:"✓";position:absolute;bottom:2px;right:5px;font-size:.65rem;color:#0a4d1c;font-weight:800;}

  .overlay{position:fixed;inset:0;z-index:100;background:rgba(8,10,18,.72);backdrop-filter:blur(4px);
    display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;}
  .overlay.show{display:flex;animation:fade .2s;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .sheet{background:var(--bg2);border:1px solid rgba(255,255,255,.08);border-radius:20px;box-shadow:var(--shadow);
    width:100%;max-width:640px;padding:26px;animation:pop .2s;}
  .sheet.wide{max-width:860px;}
  @keyframes pop{from{transform:translateY(14px) scale(.98);opacity:0;}to{transform:none;opacity:1;}}
  .sheet h2{margin:0 0 4px;} .sheet .sub{color:var(--muted);margin:0 0 20px;font-size:.9rem;}
  .sheet-head{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
  .sheet-head h2{margin:0;margin-right:auto;}

  .session-list{display:grid;gap:14px;}
  .session-card{display:flex;align-items:center;gap:16px;background:var(--panel);border-radius:var(--radius);padding:16px 18px;border:1px solid rgba(255,255,255,.06);}
  .session-card.locked{opacity:.55;}
  .session-card .badge{width:48px;height:48px;border-radius:12px;flex:none;display:grid;place-items:center;font-weight:800;font-size:1.2rem;background:linear-gradient(135deg,#5b6cff,#8b5bff);}
  .session-card .badge.done{background:linear-gradient(135deg,#2f9e44,#51cf66);}
  .session-card .badge.lk{background:var(--lock);}
  .session-info{margin-right:auto;} .session-info b{font-size:1.02rem;}
  .session-info .range{color:var(--muted);font-size:.82rem;}
  .progress{height:7px;border-radius:99px;background:#0d1024;margin-top:8px;width:180px;overflow:hidden;}
  .progress>i{display:block;height:100%;background:linear-gradient(90deg,#51cf66,#94d82d);width:0;transition:width .4s;}

  .learn-banner{background:var(--panel);border-radius:12px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .learn-banner .txt{margin-right:auto;}
  .learn-banner .txt b{display:block;}
  .learn-banner .txt small{color:var(--muted);}
  .learn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:10px;}
  .learn-tile{border-radius:12px;padding:10px 6px;text-align:center;cursor:pointer;color:#10131f;font-weight:700;position:relative;transition:transform .1s;}
  .learn-tile:hover{transform:translateY(-3px);}
  .learn-tile .lz{font-size:.6rem;opacity:.7;} .learn-tile .ls{font-size:1.3rem;line-height:1.1;} .learn-tile .ln{font-size:.62rem;opacity:.85;}
  .learn-tile.learned::after{content:"✓";position:absolute;top:4px;right:6px;font-size:.7rem;color:#0a4d1c;}

  .detail-top{display:flex;gap:20px;flex-wrap:wrap;align-items:center;}
  .big-tile{width:130px;height:130px;border-radius:18px;flex:none;display:flex;flex-direction:column;justify-content:center;align-items:center;color:#10131f;box-shadow:var(--shadow);}
  .big-tile .bz{font-size:.8rem;opacity:.75;} .big-tile .bs{font-size:3rem;font-weight:800;line-height:1;} .big-tile .bn{font-size:.8rem;font-weight:600;}
  .detail-name h2{margin:0;font-size:1.8rem;} .detail-name .cat{color:var(--muted);}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:22px 0;}
  .stat{background:var(--panel);border-radius:12px;padding:14px;text-align:center;}
  .stat .v{font-size:1.7rem;font-weight:800;} .stat .k{font-size:.75rem;color:var(--muted);margin-top:2px;}
  .stat.p .v{color:#ff8787;} .stat.n .v{color:#ffd43b;} .stat.e .v{color:#74c0fc;}
  .meta-row{display:flex;gap:22px;flex-wrap:wrap;color:var(--muted);font-size:.9rem;margin-bottom:18px;}
  .meta-row b{color:var(--text);}
  .atom-wrap{text-align:center;} .atom-wrap .cap{font-size:.72rem;color:var(--muted);}
  .facts h3{margin:18px 0 8px;font-size:1rem;}
  .facts ul{margin:0;padding-left:0;list-style:none;display:grid;gap:8px;}
  .facts li{background:var(--panel);border-radius:10px;padding:10px 12px;font-size:.92rem;line-height:1.4;display:flex;gap:8px;}
  .facts li::before{content:"💡";flex:none;}

  .particle-table{width:100%;border-collapse:collapse;margin-top:8px;}
  .particle-table th,.particle-table td{text-align:left;padding:12px 10px;border-bottom:1px solid rgba(255,255,255,.08);font-size:.92rem;}
  .particle-table th{color:var(--muted);font-weight:600;}
  .chip{display:inline-block;padding:3px 10px;border-radius:99px;font-weight:700;font-size:.8rem;}
  .chip.pos{background:#ff8787;color:#3a0c0c;} .chip.neu{background:#ffe066;color:#4a3a00;} .chip.neg{background:#74c0fc;color:#062a4a;}
  .events{margin-top:24px;} .events h3{margin:0 0 10px;font-size:1.05rem;}
  .event{background:var(--panel);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
  .event b{display:block;margin-bottom:4px;} .event span{color:var(--muted);font-size:.9rem;}
  .event .ico{font-size:1.3rem;margin-right:6px;}

  /* ---------- Battle ---------- */
  #quizView .sheet{max-width:760px;}
  .battle-stage{position:relative;background:linear-gradient(180deg,#10204a,#1a1030 80%);border-radius:16px;
    height:230px;overflow:hidden;margin-bottom:18px;border:1px solid rgba(255,255,255,.08);}
  .ground{position:absolute;bottom:0;left:0;right:0;height:46px;background:linear-gradient(180deg,#2a1a3a,#140a20);}
  .fighter{position:absolute;bottom:42px;font-size:4.6rem;filter:drop-shadow(0 6px 8px rgba(0,0,0,.5));transition:transform .1s;}
  .soldier{left:7%;} .dragon{right:7%;transform:scaleX(-1);} /* dragon faces left */
  .hpwrap{position:absolute;top:12px;width:38%;}
  .hpwrap.l{left:5%;} .hpwrap.r{right:5%;text-align:right;}
  .hpwrap .lab{font-size:.78rem;font-weight:700;margin-bottom:4px;}
  .hpbar{height:14px;border-radius:99px;background:#0008;overflow:hidden;}
  .hpbar>i{display:block;height:100%;transition:width .4s;}
  .hpbar.dragon>i{background:linear-gradient(90deg,#ff6b6b,#ff922b);}
  .hpbar.soldier>i{background:linear-gradient(90deg,#74c0fc,#51cf66);}
  .shake{animation:shake .4s;}
  @keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-6px);}80%{transform:translateX(6px);}}
  .dragon.shake{animation:shakeD .4s;}
  @keyframes shakeD{0%,100%{transform:scaleX(-1) translateX(0);}20%{transform:scaleX(-1) translateX(-8px);}40%{transform:scaleX(-1) translateX(8px);}60%{transform:scaleX(-1) translateX(-6px);}80%{transform:scaleX(-1) translateX(6px);}}
  .flame{position:absolute;bottom:70px;font-size:2.4rem;opacity:0;pointer-events:none;}
  .flame.fire{left:18%;animation:fireGo .7s ease-out;}
  .flame.blue{right:18%;animation:blueGo .7s ease-out;filter:hue-rotate(160deg) saturate(2);}
  @keyframes fireGo{0%{opacity:0;left:18%;transform:scale(.6);}15%{opacity:1;}100%{opacity:0;left:70%;transform:scale(1.3);}}
  @keyframes blueGo{0%{opacity:0;right:18%;transform:scale(.6) scaleX(-1);}15%{opacity:1;}100%{opacity:0;right:70%;transform:scale(1.3) scaleX(-1);}}
  .roar{position:absolute;top:50px;right:10%;font-weight:800;color:#ffd43b;opacity:0;font-size:1.1rem;}
  .roar.go{animation:roar .8s;}
  @keyframes roar{0%{opacity:0;transform:translateY(0) scale(.7);}30%{opacity:1;transform:translateY(-10px) scale(1.1);}100%{opacity:0;transform:translateY(-26px);}}

  .qbox{background:var(--panel);border-radius:14px;padding:18px;}
  .qbox .qmeta{display:flex;justify-content:space-between;color:var(--muted);font-size:.8rem;margin-bottom:8px;}
  .qbox .qtext{font-size:1.15rem;font-weight:700;margin-bottom:14px;}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .opt{padding:14px;border-radius:12px;background:var(--panel2);border:2px solid transparent;cursor:pointer;font-weight:600;text-align:left;transition:transform .1s,background .15s;}
  .opt:hover{transform:translateY(-2px);background:#33407a;}
  .opt.correct{background:#1d6b3a;border-color:#51cf66;} .opt.wrong{background:#7a2330;border-color:#ff6b6b;}
  .opt:disabled{cursor:default;}
  @media(max-width:560px){.opts{grid-template-columns:1fr;} .fighter{font-size:3.4rem;}}

  #congrats .sheet,#battleEnd .sheet{text-align:center;max-width:460px;}
  #congrats .emoji,#battleEnd .emoji{font-size:4rem;animation:bounce 1s infinite alternate;}
  @keyframes bounce{to{transform:translateY(-12px);}}
  .confetti{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden;}
  .confetti i{position:absolute;top:-12px;width:9px;height:14px;opacity:.9;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:1;}}
  .footer-note{text-align:center;color:var(--muted);font-size:.75rem;margin-top:26px;}
</style>
</head>
<body>

<header class="topbar">
  <div class="brand"><h1 id="appTitle">Periodic Table Explorer</h1><p id="appSub">Learn all 118 elements</p></div>
  <div class="streak"><span class="flame">🔥</span><span><span id="streakNum">0</span> <small id="streakLbl">day streak</small></span></div>
  <button class="btn primary" id="sessionsBtn">📚 <span>Sessions</span></button>
  <button class="btn" id="subatomicBtn">🔬 <span>Subatomic Particles</span></button>
  <button class="btn ghost" id="langBtn">🌐 English</button>
</header>

<main>
  <div class="legend" id="legend"></div>
  <div class="table-wrap"><div class="ptable" id="ptable"></div></div>
  <p class="footer-note" id="footNote"></p>
</main>

<!-- Sessions -->
<div class="overlay" id="sessionsView" data-close>
  <div class="sheet">
    <div class="sheet-head"><h2 id="sessionsTitle">Choose a Session</h2><button class="btn ghost" data-close-btn id="sessClose">Close</button></div>
    <div class="session-list" id="sessionList"></div>
  </div>
</div>

<!-- Learn -->
<div class="overlay" id="learnView" data-close>
  <div class="sheet wide">
    <div class="sheet-head">
      <button class="btn ghost" id="learnBack">← <span id="backTxt">Back</span></button>
      <h2 id="learnTitle" style="margin-left:6px;"></h2>
      <button class="btn ghost" data-close-btn>✕</button>
    </div>
    <div class="learn-banner" id="learnBanner"></div>
    <div class="learn-grid" id="learnGrid"></div>
  </div>
</div>

<!-- Detail -->
<div class="overlay" id="detailView" data-close>
  <div class="sheet">
    <div class="sheet-head"><h2 id="detailHdr" style="margin-right:auto;font-size:1.1rem;color:var(--muted)">Element details</h2><button class="btn ghost" data-close-btn>✕</button></div>
    <div id="detailBody"></div>
  </div>
</div>

<!-- Subatomic -->
<div class="overlay" id="subView" data-close>
  <div class="sheet">
    <div class="sheet-head"><h2 id="subTitle">Subatomic Particles</h2><button class="btn ghost" data-close-btn>✕</button></div>
    <p class="sub" id="subIntro"></p>
    <table class="particle-table">
      <thead><tr><th id="thP">Particle</th><th id="thC">Charge</th><th id="thL">Location</th><th id="thR">Role</th></tr></thead>
      <tbody id="subBody"></tbody>
    </table>
    <div class="events"><h3 id="eventsTitle"></h3><div id="eventsBody"></div></div>
  </div>
</div>

<!-- Quiz battle -->
<div class="overlay" id="quizView" data-close>
  <div class="sheet">
    <div class="sheet-head"><h2 id="quizTitle">Element Battle</h2><button class="btn ghost" data-close-btn>✕</button></div>
    <div class="battle-stage" id="stage">
      <div class="hpwrap l"><div class="lab" id="soldierLab">You</div><div class="hpbar soldier"><i id="soldierHp"></i></div></div>
      <div class="hpwrap r"><div class="lab" id="dragonLab">Dragon</div><div class="hpbar dragon"><i id="dragonHp"></i></div></div>
      <div class="fighter soldier" id="soldierEl">🧑‍🚒</div>
      <div class="fighter dragon" id="dragonEl">🐉</div>
      <div class="flame fire" id="fireFlame">🔥</div>
      <div class="flame blue" id="blueFlame">🔥</div>
      <div class="roar" id="roarEl">ROAARR!</div>
      <div class="ground"></div>
    </div>
    <div class="qbox" id="qbox"></div>
  </div>
</div>

<!-- Battle end -->
<div class="overlay" id="battleEnd">
  <div class="sheet">
    <div class="emoji" id="endEmoji">🏆</div>
    <h2 id="endTitle"></h2><p class="sub" id="endMsg"></p>
    <button class="btn primary" id="endBtn"></button>
  </div>
</div>

<!-- Congrats -->
<div class="overlay" id="congrats">
  <div class="sheet">
    <div class="emoji">🎉</div><h2 id="congTitle">Congratulations!</h2>
    <p class="sub" id="congMsg"></p><p id="congNext" style="color:var(--good);font-weight:700"></p>
    <button class="btn primary" id="congBtn">Continue</button>
  </div>
</div>

{"z":72,"en":["Hafnium can take the heat, melting only above 2,200 degrees Celsius.","It's used in the control rods that safely shut down nuclear submarines' reactors.","A thin hafnium layer made modern computer chips faster and less power-hungry."],"vi":["Hafnium chịu nhiệt cực tốt, chỉ nóng chảy trên 2.200 độ C.","Nó được dùng trong thanh điều khiển để tắt an toàn lò phản ứng tàu ngầm hạt nhân.","Một lớp hafnium mỏng giúp chip máy tính hiện đại nhanh hơn và tốn ít điện hơn."]},
{"z":73,"en":["Tantalum capacitors are tiny but vital parts inside almost every phone and laptop.","It's so body-friendly that it's used in surgical implants and bone repairs.","Its name comes from Tantalus, a Greek figure cursed with eternal thirst."],"vi":["Tụ điện tantalum nhỏ xíu nhưng là bộ phận thiết yếu trong hầu hết điện thoại và laptop.","Nó thân thiện với cơ thể đến mức được dùng làm cấy ghép phẫu thuật và vá xương.","Tên của nó đến từ Tantalus, nhân vật Hy Lạp bị nguyền rủa khát nước mãi mãi."]},
{"z":74,"en":["Tungsten has the highest melting point of any metal, over 3,400 degrees Celsius.","It was the glowing filament inside old-fashioned light bulbs.","Its incredible density makes it perfect for darts, drills, and armor-piercing tools."],"vi":["Tungsten có nhiệt độ nóng chảy cao nhất trong mọi kim loại, trên 3.400 độ C.","Nó từng là sợi tóc phát sáng bên trong bóng đèn kiểu cũ.","Mật độ cực cao khiến nó hoàn hảo cho phi tiêu, mũi khoan và dụng cụ xuyên giáp."]},
{"z":75,"en":["Rhenium was one of the last stable natural elements ever discovered.","Jet engine blades contain rhenium so they survive blazing-hot flight.","It's so rare and useful that it's one of the most expensive metals around."],"vi":["Rhenium là một trong những nguyên tố tự nhiên ổn định cuối cùng được phát hiện.","Cánh động cơ phản lực chứa rhenium để chịu được sức nóng dữ dội khi bay.","Nó hiếm và hữu ích đến mức là một trong những kim loại đắt nhất."]},
{"z":76,"en":["Osmium is the densest natural element, so a small chunk feels shockingly heavy.","It's used to make ultra-hard tips for fountain pens and instrument needles.","Its name means 'smell' because one of its compounds reeks terribly."],"vi":["Osmium là nguyên tố tự nhiên đặc nhất, nên một cục nhỏ cũng nặng đến bất ngờ.","Nó được dùng làm đầu bút siêu cứng cho bút máy và kim của dụng cụ.","Tên của nó nghĩa là 'mùi' vì một hợp chất của nó bốc mùi kinh khủng."]},
{"z":77,"en":["A layer of iridium worldwide is the smoking gun for the asteroid that killed the dinosaurs.","It's one of the most corrosion-resistant metals, barely reacting with anything.","The original metre standard bar was made from an iridium-platinum alloy."],"vi":["Một lớp iridium khắp thế giới là bằng chứng về tiểu hành tinh đã tiêu diệt khủng long.","Nó là một trong những kim loại chống ăn mòn tốt nhất, hầu như không phản ứng với gì.","Thanh chuẩn mét nguyên gốc được làm từ hợp kim iridium-platin."]},
{"z":78,"en":["Platinum sits inside car exhausts, turning toxic fumes into safer gases.","It's so rare that all the platinum ever mined would barely fill a living room.","Jewelers love it because it almost never tarnishes or fades."],"vi":["Platin nằm trong ống xả xe hơi, biến khí độc thành khí an toàn hơn.","Nó hiếm đến mức toàn bộ platin từng khai thác chỉ vừa lấp đầy một phòng khách.","Thợ kim hoàn yêu thích nó vì nó hầu như không bao giờ xỉn màu hay phai."]},
{"z":79,"en":["Nearly all the gold on Earth was forged by colliding neutron stars in space.","Gold never rusts, which is why ancient treasures still shine today.","It's so soft you could hammer one gram into a sheet covering a small room."],"vi":["Gần như toàn bộ vàng trên Trái Đất được tạo ra khi các sao neutron va chạm trong vũ trụ.","Vàng không bao giờ gỉ, đó là lý do kho báu cổ vẫn sáng lấp lánh đến nay.","Nó mềm đến mức một gram có thể dát thành tấm phủ kín một căn phòng nhỏ."]},
{"z":80,"en":["Mercury is the only metal that's liquid at room temperature.","Old hat-makers got poisoned by it, inspiring the phrase 'mad as a hatter'.","Its symbol Hg comes from 'hydrargyrum', Greek for 'liquid silver'."],"vi":["Thủy ngân là kim loại duy nhất ở thể lỏng tại nhiệt độ phòng.","Thợ làm mũ xưa bị nó đầu độc, tạo nên câu 'điên như thợ làm mũ'.","Ký hiệu Hg của nó đến từ 'hydrargyrum', tiếng Hy Lạp nghĩa là 'bạc lỏng'."]},
{"z":81,"en":["Thallium is so toxic and tasteless it earned the nickname 'the poisoner's poison'.","It was once used to kill rats and ants before being banned for safety.","A thallium isotope helps doctors take pictures of the beating heart."],"vi":["Thallium độc và không vị đến mức bị gọi là 'chất độc của kẻ đầu độc'.","Nó từng được dùng để diệt chuột và kiến trước khi bị cấm vì an toàn.","Một đồng vị thallium giúp bác sĩ chụp ảnh trái tim đang đập."]},
{"z":82,"en":["Lead aprons protect you from radiation during dental and medical X-rays.","Romans used lead pipes and cups, which slowly poisoned many of them.","It's so dense and soft it was long used in pencils' ancestors and bullets."],"vi":["Áo chì bảo vệ bạn khỏi bức xạ khi chụp X-quang răng và y tế.","Người La Mã dùng ống và cốc bằng chì, khiến nhiều người bị nhiễm độc từ từ.","Nó đặc và mềm đến mức từ lâu được dùng làm đạn và tổ tiên của bút chì."]},
{"z":83,"en":["Bismuth forms stunning rainbow staircase crystals when it cools slowly.","It's the main ingredient in pink stomach medicines like Pepto-Bismol.","Once thought stable, it's actually radioactive, but unbelievably slowly."],"vi":["Bismuth tạo ra những tinh thể cầu thang cầu vồng tuyệt đẹp khi nguội chậm.","Nó là thành phần chính trong thuốc dạ dày màu hồng như Pepto-Bismol.","Từng được cho là ổn định, nhưng thật ra nó phóng xạ, chỉ là cực kỳ chậm."]},
{"z":84,"en":["Polonium is so deadly that an amount smaller than a grain of salt can kill.","Marie Curie discovered it and named it after her homeland, Poland.","It was used in a famous real-life spy poisoning case in 2006."],"vi":["Polonium độc đến mức một lượng nhỏ hơn hạt muối cũng có thể giết người.","Marie Curie phát hiện ra nó và đặt tên theo quê hương bà, Ba Lan.","Nó từng được dùng trong một vụ đầu độc gián điệp có thật nổi tiếng năm 2006."]},
{"z":85,"en":["Astatine is the rarest natural element; less than a teaspoon exists on Earth at once.","It's so radioactive it would vaporize itself before you could see a visible chunk.","Scientists are testing it to deliver radiation directly to cancer cells."],"vi":["Astatine là nguyên tố tự nhiên hiếm nhất; cả Trái Đất chỉ có chưa tới một thìa cà phê.","Nó phóng xạ mạnh đến mức tự bốc hơi trước khi bạn thấy được một mẩu nhìn rõ.","Các nhà khoa học đang thử dùng nó để đưa bức xạ thẳng vào tế bào ung thư."]},
{"z":86,"en":["Radon is an invisible radioactive gas that can seep into homes from the ground.","It's the second leading cause of lung cancer after smoking.","Despite being a noble gas, it's the heaviest one and quite dangerous."],"vi":["Radon là khí phóng xạ vô hình có thể thấm vào nhà từ dưới lòng đất.","Nó là nguyên nhân gây ung thư phổi đứng thứ hai, chỉ sau hút thuốc.","Dù là khí hiếm, nó là loại nặng nhất và khá nguy hiểm."]},
{"z":87,"en":["Francium is one of the rarest elements; only a few atoms exist naturally at any time.","It's so unstable that no one has ever collected enough to actually see it.","It was the last element discovered in nature, found in 1939."],"vi":["Francium là một trong những nguyên tố hiếm nhất; tự nhiên chỉ có vài nguyên tử mỗi lúc.","Nó bất ổn đến mức chưa ai từng thu đủ để thực sự nhìn thấy nó.","Đây là nguyên tố cuối cùng được phát hiện trong tự nhiên, vào năm 1939."]},
{"z":88,"en":["Radium glows a faint blue-green, and people once put it in glow-in-the-dark paint.","Watch-dial painters who licked their brushes got terribly sick from it.","Marie Curie discovered it, and her notebooks are still radioactive today."],"vi":["Radium phát ánh xanh lục mờ, và người ta từng cho nó vào sơn phát sáng trong tối.","Thợ vẽ mặt đồng hồ liếm cọ đã bị bệnh nặng vì nó.","Marie Curie phát hiện ra nó, và sổ tay của bà đến nay vẫn còn phóng xạ."]},
{"z":89,"en":["Actinium glows an eerie pale blue in the dark from its intense radioactivity.","It gave its name to the actinides, a whole row of the periodic table.","Scientists are exploring it as a precise weapon against cancer cells."],"vi":["Actinium phát ánh xanh nhạt kỳ lạ trong bóng tối vì phóng xạ cực mạnh.","Nó đặt tên cho nhóm actini, cả một hàng trong bảng tuần hoàn.","Các nhà khoa học đang nghiên cứu nó như một vũ khí chính xác chống tế bào ung thư."]},
{"z":90,"en":["Thorium could one day power safer, cleaner nuclear reactors of the future.","It's about three times more abundant than uranium in the Earth's crust.","It was once used to make camping lantern mantles glow brilliantly white."],"vi":["Thorium một ngày nào đó có thể vận hành lò phản ứng hạt nhân an toàn, sạch hơn của tương lai.","Nó nhiều gấp khoảng ba lần uranium trong vỏ Trái Đất.","Nó từng được dùng làm lưới đèn măng-sông cắm trại phát sáng trắng rực rỡ."]},
{"z":91,"en":["Protactinium is one of the rarest natural elements, with barely a gram existing in tonnes of uranium ore.","Its name means 'before actinium' because it decays into actinium.","It is so scarce and radioactive that scientists once spent years extracting just 125 grams from 60 tonnes of waste."],"vi":["Protactini là một trong những nguyên tố tự nhiên hiếm nhất, chỉ có chưa tới một gram trong hàng tấn quặng urani.","Tên của nó nghĩa là 'trước actini' vì nó phân rã thành actini.","Nó hiếm và phóng xạ tới mức từng có nhóm nhà khoa học mất nhiều năm để tách được vỏn vẹn 125 gram từ 60 tấn chất thải."]},
{"z":92,"en":["Uranium powers nuclear reactors and was the fuel inside the first atomic bombs.","It was named after the planet Uranus, discovered just eight years earlier.","A single uranium fuel pellet the size of a fingertip holds as much energy as a tonne of coal."],"vi":["Urani cung cấp năng lượng cho lò phản ứng hạt nhân và là nhiên liệu trong những quả bom nguyên tử đầu tiên.","Nó được đặt tên theo sao Thiên Vương, hành tinh vừa được phát hiện tám năm trước đó.","Một viên nhiên liệu urani nhỏ bằng đầu ngón tay chứa năng lượng tương đương cả một tấn than."]},
{"z":93,"en":["Neptunium was the first synthetic element heavier than uranium ever made.","It was named after Neptune, continuing the planet theme right after uranium.","Tiny amounts form naturally in uranium ore from neutron capture."],"vi":["Neptuni là nguyên tố nhân tạo nặng hơn urani đầu tiên từng được tạo ra.","Nó được đặt tên theo sao Hải Vương, nối tiếp chủ đề hành tinh ngay sau urani.","Một lượng cực nhỏ hình thành tự nhiên trong quặng urani nhờ quá trình bắt nơtron."]},
{"z":94,"en":["Plutonium powers space probes like Voyager and the Mars rovers using its own heat.","It was named after Pluto and is famous as a nuclear weapon material.","A lump of plutonium feels warm to the touch because of its constant radioactive decay."],"vi":["Plutoni cung cấp năng lượng cho các tàu thăm dò vũ trụ như Voyager và xe tự hành sao Hỏa nhờ nhiệt tự sinh.","Nó được đặt tên theo sao Diêm Vương và nổi tiếng là vật liệu chế tạo vũ khí hạt nhân.","Một cục plutoni sờ vào thấy ấm vì nó liên tục phân rã phóng xạ."]},
{"z":95,"en":["Americium is inside most home smoke detectors, helping save lives every day.","It was named after America, where it was discovered during World War II.","Tiny americium emits particles that sense smoke before you can even see it."],"vi":["Americi nằm trong hầu hết các đầu báo khói gia đình, giúp cứu mạng người mỗi ngày.","Nó được đặt tên theo châu Mỹ, nơi nó được phát hiện trong Thế chiến thứ hai.","Một chút americi phát ra các hạt giúp phát hiện khói trước cả khi bạn nhìn thấy."]},
{"z":96,"en":["Curium was named after Marie and Pierre Curie, pioneers of radioactivity.","It glows purple in the dark from its own intense radiation.","NASA used curium in instruments that analyzed Martian rocks."],"vi":["Curi được đặt tên theo Marie và Pierre Curie, hai người tiên phong nghiên cứu phóng xạ.","Nó phát sáng màu tím trong bóng tối nhờ bức xạ cực mạnh của chính mình.","NASA đã dùng curi trong thiết bị phân tích đá trên sao Hỏa."]},
{"z":97,"en":["Berkelium was named after Berkeley, California, where it was first created.","It is so rare that only fractions of a gram have ever been made.","Making berkelium for experiments can take over a year of patient work."],"vi":["Berkeli được đặt tên theo thành phố Berkeley, California, nơi nó lần đầu được tạo ra.","Nó hiếm tới mức tổng cộng chỉ vài phần nhỏ của một gram từng được tạo ra.","Việc sản xuất berkeli cho thí nghiệm có thể mất hơn một năm làm việc kiên nhẫn."]},
{"z":98,"en":["Californium is one of the most expensive substances on Earth, worth millions per gram.","It is a powerful neutron source used to detect gold and find oil underground.","It was named after the U.S. state of California."],"vi":["Californi là một trong những chất đắt nhất Trái Đất, trị giá hàng triệu đô mỗi gram.","Nó là nguồn nơtron mạnh dùng để dò vàng và tìm dầu dưới lòng đất.","Nó được đặt tên theo bang California của Mỹ."]},
{"z":99,"en":["Einsteinium was named after Albert Einstein, the famous physicist.","It was first discovered in the debris of a hydrogen bomb test in 1952.","It is so radioactive that it glows and slowly destroys its own container."],"vi":["Einsteini được đặt tên theo Albert Einstein, nhà vật lý nổi tiếng.","Nó được phát hiện lần đầu trong mảnh vụn của một vụ thử bom khinh khí năm 1952.","Nó phóng xạ mạnh tới mức phát sáng và từ từ phá hủy chính vật chứa nó."]},
{"z":100,"en":["Fermium was named after Enrico Fermi, builder of the first nuclear reactor.","Like einsteinium, it was first found in hydrogen bomb test fallout.","No element heavier than fermium can be made by simply adding neutrons."],"vi":["Fermi được đặt tên theo Enrico Fermi, người xây lò phản ứng hạt nhân đầu tiên.","Giống einsteini, nó được tìm thấy lần đầu trong bụi phóng xạ của vụ thử bom khinh khí.","Không nguyên tố nào nặng hơn fermi có thể tạo ra chỉ bằng cách thêm nơtron."]},
{"z":101,"en":["Mendelevium honors Dmitri Mendeleev, the inventor of the periodic table.","Scientists made the very first sample one atom at a time.","It can only be studied in incredibly tiny, short-lived amounts."],"vi":["Mendelevi vinh danh Dmitri Mendeleev, người sáng tạo bảng tuần hoàn.","Các nhà khoa học đã tạo ra mẫu đầu tiên từng nguyên tử một.","Nó chỉ có thể nghiên cứu ở lượng cực nhỏ và tồn tại rất ngắn."]},
{"z":102,"en":["Nobelium was named after Alfred Nobel, inventor of dynamite and the Nobel Prizes.","Several labs argued for years over who discovered it first.","Its longest-lived form survives only about an hour."],"vi":["Nobeli được đặt tên theo Alfred Nobel, người phát minh thuốc nổ dynamite và Giải Nobel.","Nhiều phòng thí nghiệm tranh cãi suốt nhiều năm về việc ai phát hiện ra nó trước.","Dạng bền nhất của nó chỉ tồn tại khoảng một giờ."]},
{"z":103,"en":["Lawrencium was named after Ernest Lawrence, who invented the cyclotron particle accelerator.","It is the last element in the actinide row of the periodic table.","Only a few atoms have ever been created at a time."],"vi":["Lawrenci được đặt tên theo Ernest Lawrence, người phát minh máy gia tốc cyclotron.","Nó là nguyên tố cuối cùng trong dãy actini của bảng tuần hoàn.","Mỗi lần chỉ có vài nguyên tử từng được tạo ra."]},
{"z":104,"en":["Rutherfordium was named after Ernest Rutherford, the father of nuclear physics.","It is the first 'superheavy' transition metal, made only in particle accelerators.","Its atoms vanish in seconds or less after being created."],"vi":["Rutherfordi được đặt tên theo Ernest Rutherford, cha đẻ của vật lý hạt nhân.","Nó là kim loại chuyển tiếp 'siêu nặng' đầu tiên, chỉ tạo được trong máy gia tốc hạt.","Các nguyên tử của nó biến mất chỉ trong vài giây hoặc nhanh hơn."]},
{"z":105,"en":["Dubnium was named after Dubna, a Russian town famous for nuclear research.","American and Soviet labs both claimed to discover it during the Cold War.","Only a handful of its atoms have ever existed."],"vi":["Dubni được đặt tên theo Dubna, một thị trấn Nga nổi tiếng về nghiên cứu hạt nhân.","Cả phòng thí nghiệm Mỹ và Liên Xô đều tuyên bố phát hiện ra nó thời Chiến tranh Lạnh.","Tổng cộng chỉ có một nhúm nguyên tử của nó từng tồn tại."]},
{"z":106,"en":["Seaborgium was named after Glenn Seaborg while he was still alive, a rare honor.","Seaborg himself helped discover ten different elements.","Its atoms survive only a few seconds before decaying."],"vi":["Seaborgi được đặt tên theo Glenn Seaborg khi ông còn sống, một vinh dự hiếm có.","Chính Seaborg đã góp phần phát hiện tới mười nguyên tố khác nhau.","Các nguyên tử của nó chỉ tồn tại vài giây trước khi phân rã."]},
{"z":107,"en":["Bohrium was named after Niels Bohr, who explained how atoms are structured.","It was first created in Germany by smashing atoms together.","Scientists have only ever made a few atoms of it."],"vi":["Bohri được đặt tên theo Niels Bohr, người giải thích cấu trúc của nguyên tử.","Nó được tạo ra lần đầu ở Đức bằng cách bắn các nguyên tử va vào nhau.","Các nhà khoa học mới chỉ tạo được vài nguyên tử của nó."]},

/* ===== STATE ===== */
const SESSION_SIZE=20, SESSION_COUNT=6;
const sessionOf = z => Math.min(SESSION_COUNT, Math.floor((z-1)/SESSION_SIZE)+1);
const elementsOf = s => E.filter(el => sessionOf(el.z)===s);
const KEY="ptable.save.v2";
const defaultState={lang:"en",learned:[],unlocked:1,completed:[],streak:0,lastStudy:null};
let S = load();

function ymd(d){const p=n=>String(n).padStart(2,"0");return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate());}
function today(){return ymd(new Date());}
function yesterday(){const d=new Date();d.setDate(d.getDate()-1);return ymd(d);}
function load(){
  try{
    const raw=JSON.parse(localStorage.getItem(KEY));
    if(!raw) return {...defaultState,learnedSet:new Set(),completedSet:new Set()};
    const s={...defaultState,...raw};
    s.learnedSet=new Set(s.learned); s.completedSet=new Set(s.completed||[]);
    if(s.lastStudy && s.lastStudy!==today() && s.lastStudy!==yesterday()){s.streak=0;s.lastStudy=null;}
    return s;
  }catch{return {...defaultState,learnedSet:new Set(),completedSet:new Set()};}
}
function save(){
  S.learned=[...S.learnedSet]; S.completed=[...S.completedSet];
  localStorage.setItem(KEY,JSON.stringify({lang:S.lang,learned:S.learned,unlocked:S.unlocked,completed:S.completed,streak:S.streak,lastStudy:S.lastStudy}));
}
function registerStudyDay(){
  if(S.lastStudy===today()) return;
  S.streak=(S.lastStudy===yesterday())?S.streak+1:1; S.lastStudy=today();
}
const t = ()=>I18N[S.lang];
const name = el => el.name;          // IUPAC name (same in both languages)
const $ = id => document.getElementById(id);
const fmt = (str,x)=>str.replace("{x}",x).replace("{s}",x);

function renderHeader(){$("streakNum").textContent=S.streak;}
function renderLegend(){const L=t();$("legend").innerHTML=Object.keys(CAT_COLOR).map(c=>`<span><i style="background:var(${CAT_COLOR[c]})"></i>${L.cats[c]}</span>`).join("");}
function renderTable(){
  const grid=$("ptable"); grid.innerHTML="";
  [{col:3,row:6,txt:"57–71"},{col:3,row:7,txt:"89–103"}].forEach(m=>{
    const d=document.createElement("div"); d.className="cell";
    d.style.gridColumn=m.col; d.style.gridRow=m.row; d.style.background="#2a3050";
    d.style.color="#8b94c4"; d.style.fontSize=".62rem"; d.style.cursor="default"; d.textContent=m.txt;
    grid.appendChild(d);
  });
  E.forEach(el=>{
    const cell=document.createElement("div");
    const unlocked=sessionOf(el.z)<=S.unlocked;
    cell.className="cell"+(unlocked?"":" locked")+(S.learnedSet.has(el.z)?" learned":"");
    cell.style.gridColumn=el.col; cell.style.gridRow=el.row;
    if(unlocked) cell.style.background=color(el);
    cell.innerHTML=`<span class="num">${el.z}</span><span class="sym">${el.sym}</span>`+(unlocked?"":`<span class="lockicon">🔒</span>`);
    if(unlocked) cell.onclick=()=>openDetail(el);
    grid.appendChild(cell);
  });
}

/* ===== SESSIONS ===== */
function openSessions(){
  const L=t(); const list=$("sessionList"); list.innerHTML="";
  for(let s=1;s<=SESSION_COUNT;s++){
    const els=elementsOf(s);
    const learnedCount=els.filter(e=>S.learnedSet.has(e.z)).length;
    const unlocked=s<=S.unlocked, done=S.completedSet.has(s);
    const pct=Math.round(learnedCount/els.length*100);
    const card=document.createElement("div");
    card.className="session-card"+(unlocked?"":" locked");
    const badge=done?"badge done":(unlocked?"badge":"badge lk");
    const action=!unlocked?`<span style="color:var(--muted)">🔒 ${L.locked}</span>`
      :`<button class="btn primary">${done?L.relearn:(learnedCount?L.continue:L.start)}</button>`;
    card.innerHTML=`<div class="${badge}">${unlocked?(done?"✓":s):"🔒"}</div>
      <div class="session-info"><b>${L.session} ${s}</b> <span class="range">(${els[0].z}–${els[els.length-1].z})</span>
        <div style="font-size:.8rem;color:var(--muted);margin-top:2px">${learnedCount}/${els.length} ${L.learned}${done?" · "+L.completed:""}</div>
        <div class="progress"><i style="width:${pct}%"></i></div></div><div>${action}</div>`;
    if(unlocked) card.querySelector("button").onclick=()=>{close("sessionsView");openLearn(s);};
    list.appendChild(card);
  }
  show("sessionsView");
}

let currentSession=1;
function openLearn(s){
  currentSession=s; const L=t(); const els=elementsOf(s);
  $("learnTitle").textContent=`${L.session} ${s} · ${els[0].z}–${els[els.length-1].z}`;
  const learnedCount=els.filter(e=>S.learnedSet.has(e.z)).length;
  const ready=learnedCount===els.length;
  const banner=$("learnBanner");
  banner.innerHTML=`<div class="txt"><b>${ready?L.bannerReady:L.bannerLearn}</b><small>${learnedCount}/${els.length} ${L.learned}</small></div>
    <button class="btn ${ready?'danger':''}" id="fightBtn" ${ready?"":"disabled"}>${ready?L.fightBtn:L.quizLockedBtn}</button>`;
  if(ready) $("fightBtn").onclick=()=>{close("learnView");startBattle(s);};
  const grid=$("learnGrid"); grid.innerHTML="";
  els.forEach(el=>{
    const tile=document.createElement("div");
    tile.className="learn-tile"+(S.learnedSet.has(el.z)?" learned":"");
    tile.style.background=color(el);
    tile.innerHTML=`<div class="lz">${el.z}</div><div class="ls">${el.sym}</div><div class="ln">${name(el)}</div>`;
    tile.onclick=()=>openDetail(el,s);
    grid.appendChild(tile);
  });
  show("learnView");
}

/* ===== DETAIL ===== */
function openDetail(el,fromSession){
  const L=t();
  const protons=el.z, electrons=el.z, neutrons=Math.round(el.mass)-el.z;
  const isLearned=S.learnedSet.has(el.z);
  const facts=(FACTS[el.z]?FACTS[el.z][S.lang]:[])||[];
  $("detailBody").innerHTML=`
    <div class="detail-top">
      <div class="big-tile" style="background:${color(el)}"><span class="bz">${el.z}</span><span class="bs">${el.sym}</span><span class="bn">${name(el)}</span></div>
      <div class="detail-name"><h2>${name(el)}</h2><div class="cat">${L.cats[el.cat]}</div>
        <div class="atom-wrap">${atomSVG(el.z)}<div class="cap">${L.atomCap}: ${(SHELLS[el.z]||[]).join(", ")}</div></div></div>
    </div>
    <div class="stats">
      <div class="stat p"><div class="v">${protons}</div><div class="k">${L.protons}</div></div>
      <div class="stat n"><div class="v">${neutrons}</div><div class="k">${L.neutrons}</div></div>
      <div class="stat e"><div class="v">${electrons}</div><div class="k">${L.electrons}</div></div>
    </div>
    <div class="meta-row"><span>${L.atomicNumber}: <b>${el.z}</b></span><span>${L.atomicMass}: <b>${el.mass} amu</b></span><span>${L.categoryLbl}: <b>${L.cats[el.cat]}</b></span></div>
    <div class="facts"><h3>💡 ${L.funFacts}</h3><ul>${facts.map(f=>`<li>${f}</li>`).join("")}</ul></div>
    <button class="btn primary" id="markBtn" style="margin-top:16px">${isLearned?L.relearnBtn:L.markLearned}</button>`;
  $("markBtn").onclick=()=>{markLearned(el); if(fromSession) openLearn(fromSession); else renderTable(); close("detailView");};
  show("detailView");
}
function atomSVG(z){
  const shells=SHELLS[z]||[]; const size=132,cx=size/2,cy=size/2,maxR=cx-10,nucR=11;
  let svg=`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`;
  svg+=`<circle cx="${cx}" cy="${cy}" r="${nucR}" fill="#ff8787"/>`;
  const n=shells.length;
  shells.forEach((count,i)=>{
    const r=nucR+8+(i+1)*((maxR-nucR-8)/n);
    svg+=`<circle cx="${cx}" cy="${cy}" r="${r.toFixed(1)}" fill="none" stroke="rgba(116,192,252,.4)" stroke-width="1"/>`;
    for(let k=0;k<count;k++){
      const a=(2*Math.PI*k)/count - Math.PI/2;
      svg+=`<circle cx="${(cx+r*Math.cos(a)).toFixed(1)}" cy="${(cy+r*Math.sin(a)).toFixed(1)}" r="2.3" fill="#74c0fc"/>`;
    }
  });
  return svg+`</svg>`;
}
function markLearned(el){
  S.learnedSet.add(el.z); registerStudyDay(); renderHeader(); save();
}

  const L=t();
  $("subBody").innerHTML=L.particles.map(p=>`<tr><td><b>${p[0]}</b></td><td><span class="chip ${p[1]}">${p[2]}</span></td><td>${p[3]}</td><td>${p[4]}</td></tr>`).join("");
  $("eventsBody").innerHTML=L.events.map(e=>`<div class="event"><b><span class="ico">${e[0]}</span>${e[1]}</b><span>${e[2]}</span></div>`).join("");
  show("subView");
}

/* ===== QUIZ BATTLE ===== */
let battle=null;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function startBattle(s){
  battle={s:s,dragon:100,soldier:5,qNum:0,els:elementsOf(s)};
  updateHp(); $("dragonEl").textContent="🐉"; $("soldierEl").textContent="🧑‍🚒";
  show("quizView"); nextQuestion();
}
function updateHp(){
  $("dragonHp").style.width=Math.max(0,battle.dragon)+"%";
  $("soldierHp").style.width=(Math.max(0,battle.soldier)/5*100)+"%";
}
function makeQuestion(){
  const L=t(); const els=battle.els; const el=pick(els);
  const type=pick(["sym","name","prot","elec","neut","fact"]);
  let q,correct,opts;
  const otherEls=()=>shuffle(E.filter(e=>e.z!==el.z));
  if(type==="sym"){ q=fmt(L.qSym,name(el)); correct=el.sym; opts=[correct,...otherEls().slice(0,3).map(e=>e.sym)]; }
  else if(type==="name"){ q=fmt(L.qName,el.sym); correct=name(el); opts=[correct,...otherEls().slice(0,3).map(e=>name(e))]; }
  else if(type==="prot"||type==="elec"||type==="neut"){
    correct = type==="neut" ? (Math.round(el.mass)-el.z) : el.z;
    q = fmt(type==="prot"?L.qProt:type==="elec"?L.qElec:L.qNeut, name(el));
    const set=new Set([correct]); const offs=shuffle([-3,-2,-1,1,2,3,4,-4,5]);
    for(const o of offs){ if(set.size>=4) break; const v=correct+o; if(v>=0) set.add(v); }
    opts=[...set];
  } else { // fact
    q=fmt(L.qFact,name(el)); correct=pick(FACTS[el.z][S.lang]);
    const pool=shuffle(E.filter(e=>e.z!==el.z && FACTS[e.z])).slice(0,3).map(e=>pick(FACTS[e.z][S.lang]));
    opts=[correct,...pool];
  }
  opts=shuffle(opts.map(String));
  return {q,correct:String(correct),opts};
}
function nextQuestion(){
  const L=t(); battle.qNum++; const Q=makeQuestion();
  $("qbox").innerHTML=`<div class="qmeta"><span>${L.question} ${battle.qNum}</span><span>🐉 ${Math.max(0,battle.dragon)} HP · ❤️ ${Math.max(0,battle.soldier)}</span></div>
    <div class="qtext">${Q.q}</div><div class="opts">${Q.opts.map((o,i)=>`<button class="opt" data-i="${i}">${o}</button>`).join("")}</div>`;
  $("qbox").querySelectorAll(".opt").forEach(b=>{
    b.onclick=()=>answer(b,Q,b.textContent===Q.correct);
  });
}
function answer(btn,Q,correct){
  $("qbox").querySelectorAll(".opt").forEach(b=>{b.disabled=true; if(b.textContent===Q.correct) b.classList.add("correct");});
  if(correct){ btn.classList.add("correct"); battle.dragon-=10; fireAttack(); }
  else { btn.classList.add("wrong"); battle.soldier-=1; blueAttack(); }
  updateHp();
  setTimeout(()=>{
    if(battle.dragon<=0) winBattle();
    else if(battle.soldier<=0) loseBattle();
    else nextQuestion();
  },1000);
}
function fireAttack(){
  beep(140,.18,"sawtooth"); // roar
  whoosh();
  const f=$("fireFlame"); f.style.animation="none"; void f.offsetWidth; f.style.animation="";
  f.classList.remove("fire"); void f.offsetWidth; f.classList.add("fire");
  const d=$("dragonEl"), r=$("roarEl");
  setTimeout(()=>{d.classList.add("shake"); r.classList.add("go"); setTimeout(()=>{d.classList.remove("shake");r.classList.remove("go");},500);},400);
}
function blueAttack(){
  beep(90,.22,"square");
  const f=$("blueFlame"); f.classList.remove("blue"); void f.offsetWidth; f.classList.add("blue");
  const sld=$("soldierEl");
  setTimeout(()=>{sld.classList.add("shake"); setTimeout(()=>sld.classList.remove("shake"),500);},400);
}
function winBattle(){
  const L=t(); const s=battle.s; S.completedSet.add(s);
  let unlockedNew=false;
  if(s===S.unlocked && s<SESSION_COUNT){S.unlocked=s+1; unlockedNew=true;}
  registerStudyDay(); save(); renderHeader(); renderTable();
  close("quizView");
  $("endEmoji").textContent="🏆"; $("endTitle").textContent=L.win;
  $("endMsg").textContent=fmt(L.winMsg,`${L.session} ${s}`);
  $("endBtn").textContent=L.continue;
  $("endBtn").onclick=()=>{close("battleEnd"); celebrate(s,unlockedNew);};
  show("battleEnd"); confetti();
}
function loseBattle(){
  const L=t(); const s=battle.s;
  close("quizView");
  $("endEmoji").textContent="💀"; $("endTitle").textContent=L.lose; $("endMsg").textContent=L.loseMsg;
  $("endBtn").textContent=L.tryAgain; $("endBtn").onclick=()=>{close("battleEnd"); startBattle(s);};
  show("battleEnd");
}

/* simple Web Audio sound effects (guarded) */
let AC=null;
function ac(){try{AC=AC||new (window.AudioContext||window.webkitAudioContext)();return AC;}catch{return null;}}
function beep(freq,dur,type){
  const c=ac(); if(!c) return;
  try{const o=c.createOscillator(),g=c.createGain();o.type=type||"sine";o.frequency.value=freq;
    o.connect(g);g.connect(c.destination);g.gain.setValueAtTime(.14,c.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,c.currentTime+dur);o.start();o.stop(c.currentTime+dur);}catch{}
}
function whoosh(){const c=ac();if(!c)return;try{const o=c.createOscillator(),g=c.createGain();o.type="triangle";
  o.frequency.setValueAtTime(600,c.currentTime);o.frequency.exponentialRampToValueAtTime(200,c.currentTime+.25);
  o.connect(g);g.connect(c.destination);g.gain.setValueAtTime(.1,c.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.25);o.start();o.stop(c.currentTime+.25);}catch{}}

/* ===== CONGRATS + confetti ===== */
function celebrate(s,unlockedNew){
  const L=t();
  $("congMsg").textContent=fmt(L.congMsg,`${L.session} ${s}`);
  $("congNext").textContent=unlockedNew?L.nextUnlocked:(s===SESSION_COUNT?L.allDone:"");
  show("congrats"); confetti();
}
function confetti(){
  const box=document.createElement("div"); box.className="confetti";
  const cols=["#ff6b6b","#ffd43b","#51cf66","#4dabf7","#da77f2","#ff922b"];
  for(let i=0;i<90;i++){const p=document.createElement("i");p.style.left=(Math.random()*100)+"vw";
    p.style.background=cols[i%cols.length];p.style.animationDuration=(2+Math.random()*2)+"s";
    p.style.animationDelay=(Math.random()*.6)+"s";box.appendChild(p);}
  document.body.appendChild(box); setTimeout(()=>box.remove(),4200);
}

/* ===== WIRING ===== */
function show(id){$(id).classList.add("show");}
function close(id){$(id).classList.remove("show");}
document.querySelectorAll(".overlay[data-close]").forEach(ov=>ov.addEventListener("click",e=>{if(e.target===ov)close(ov.id);}));
document.querySelectorAll("[data-close-btn]").forEach(b=>b.addEventListener("click",()=>close(b.closest(".overlay").id)));
$("learnBack").onclick=()=>{close("learnView");openSessions();};
$("sessionsBtn").onclick=openSessions;
$("subatomicBtn").onclick=openSubatomic;
$("congBtn").onclick=()=>{close("congrats");renderTable();openSessions();};
$("langBtn").onclick=()=>{S.lang=S.lang==="en"?"vi":"en";save();document.documentElement.lang=S.lang;renderAll();};
document.addEventListener("keydown",e=>{if(e.key==="Escape")document.querySelectorAll(".overlay.show").forEach(o=>close(o.id));});

function renderAll(){applyStaticText();renderHeader();renderLegend();renderTable();}
renderAll();
</script>
